<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>羿璿裝潢設計 - 專業報價系統</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; font-family: "Microsoft JhengHei", sans-serif; padding: 10px; }
        .quote-box { max-width: 1100px; margin: auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .control-panel { background: #fff3cd; border: 1px solid #ffeeba; padding: 15px; border-radius: 8px; margin-bottom: 15px; }
        .client-info-section { background: #f8f9fa; padding: 15px; border-radius: 5px; margin-bottom: 20px; border: 1px solid #ddd; }
        .category-row { background-color: #343a40; color: white; font-weight: bold; }
        .manual-input { background-color: #fff9c4 !important; border: 1px solid #fbc02d !important; text-align: right; }
        .grand-total { background: #212529; color: #ffeb3b; padding: 20px; border-radius: 4px; text-align: right; margin-top: 20px; }
        .no-border-input { border: none; border-bottom: 1px solid #ccc; background: transparent; width: 100%; padding: 2px 5px; }
        .no-border-input:focus { outline: none; border-bottom: 2px solid #333; }
        .final-price { color: #0d6efd; font-weight: bold; }
        @media print { .no-print { display: none; } .quote-box { box-shadow: none; border: none; width: 100%; margin: 0; padding: 0; } .no-border-input { border-bottom: none; } }
    </style>
</head>
<body>

<div id="app" class="quote-box">
    <div class="text-center mb-4">
        <h2 class="fw-bold">羿璿裝潢設計企業有限公司</h2>
        <h5 class="text-secondary fw-bold">工程報價單</h5>
    </div>

    <div class="client-info-section">
        <div class="row g-3 text-start">
            <div class="col-md-6 col-12 d-flex align-items-center">
                <span style="white-space:nowrap" class="fw-bold me-2">業主名稱：</span>
                <input type="text" v-model="client.name" class="no-border-input" placeholder="請輸入業主姓名">
            </div>
            <div class="col-md-6 col-12 d-flex align-items-center">
                <span style="white-space:nowrap" class="fw-bold me-2">報價日期：</span>
                <input type="date" v-model="client.date" class="no-border-input">
            </div>
            <div class="col-md-6 col-12 d-flex align-items-center">
                <span style="white-space:nowrap" class="fw-bold me-2">工程地點：</span>
                <input type="text" v-model="client.address" class="no-border-input" placeholder="請輸入施工地址">
            </div>
            <div class="col-md-6 col-12 d-flex align-items-center">
                <span style="white-space:nowrap" class="fw-bold me-2">聯絡電話：</span>
                <input type="text" v-model="client.phone" class="no-border-input" placeholder="請輸入聯絡電話">
            </div>
        </div>
    </div>

    <div class="control-panel no-print">
        <div class="row g-2 align-items-end">
            <div class="col-6 col-md-2">
                <label class="form-label small fw-bold">📈 全域調幅 %</label>
                <input type="number" v-model.number="globalMarkup" class="form-control form-control-sm">
            </div>
            <div class="col-6 col-md-2">
                <label class="form-label small fw-bold">🏗️ 監造費率 %</label>
                <input type="number" v-model.number="supervisionRate" class="form-control form-control-sm fw-bold">
            </div>
            <div class="col-12 col-md-8 text-end">
                <button class="btn btn-success btn-sm me-1" @click="saveToLocal">💾 本機暫存</button>
                <button class="btn btn-outline-primary btn-sm me-1" @click="saveToFile">📥 下載備份</button>
                <button class="btn btn-outline-secondary btn-sm me-1" @click="triggerUpload">📂 讀取舊案</button>
                <input type="file" id="fileInput" @change="loadFromFile" style="display:none" accept=".json">
                <button class="btn btn-dark btn-sm px-3" onclick="window.print()">🖨️ 列印/轉PDF</button>
            </div>
        </div>
        <div class="mt-2 text-muted" style="font-size: 11px;">* 「本機暫存」會記住目前輸入的所有內容，下次開啟自動恢復。</div>
    </div>

    <div class="table-responsive">
        <table class="table table-sm table-bordered align-middle">
            <thead class="table-dark text-center">
                <tr class="small">
                    <th style="width: 40%;">工程名稱及說明</th>
                    <th style="width: 80px;">數量</th>
                    <th style="width: 60px;">單位</th>
                    <th style="width: 120px;">底價</th>
                    <th style="width: 120px;">複價</th>
                </tr>
            </thead>
            <tbody v-for="(group, cat) in groupedItems" :key="cat">
                <tr class="category-row"><td colspan="5" class="small p-1 px-2">{{ cat }}</td></tr>
                <tr v-for="item
