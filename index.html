<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>羿璿裝潢設計 - 專業報價系統</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; font-family: "Microsoft JhengHei", sans-serif; padding: 10px; }
        .quote-box { max-width: 1100px; margin: auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .control-panel { background: #fff3cd; border: 1px solid #ffeeba; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .category-row { background-color: #343a40; color: white; font-weight: bold; }
        .manual-input { background-color: #fff9c4 !important; border: 1px solid #fbc02d !important; text-align: right; }
        .final-price { color: #0d6efd; font-weight: bold; }
        .grand-total { background: #212529; color: #ffeb3b; padding: 15px; border-radius: 4px; text-align: right; }
        @media print { .no-print { display: none; } .quote-box { box-shadow: none; border: none; width: 100%; margin: 0; padding: 0; } }
    </style>
</head>
<body>

<div id="app" class="quote-box">
    <div class="text-center mb-3">
        <h2 class="fw-bold">羿璿裝潢設計企業有限公司</h2>
        <p class="text-muted small">專業報價系統 - 完整功能存檔版</p>
    </div>

    <div class="control-panel no-print">
        <div class="row g-2 align-items-end">
            <div class="col-6 col-md-2">
                <label class="form-label small fw-bold">📈 全域調幅 %</label>
                <input type="number" v-model.number="globalMarkup" class="form-control form-control-sm">
            </div>
            <div class="col-6 col-md-2">
                <label class="form-label small fw-bold">🏗️ 監造費率 %</label>
                <input type="number" v-model.number="supervisionRate" class="form-control form-control-sm text-success fw-bold">
            </div>
            <div class="col-12 col-md-8 text-end">
                <button class="btn btn-outline-primary btn-sm me-1" @click="saveToFile">💾 存檔此案</button>
                <button class="btn btn-outline-secondary btn-sm me-1" @click="triggerUpload">📂 讀取舊案</button>
                <input type="file" id="file
